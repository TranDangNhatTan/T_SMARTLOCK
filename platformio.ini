; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

; Danh sách các thư viện tải
lib_deps =
    ; 1. Thư viện Bàn phím ma trận
    chris--a/Keypad @ ^3.1.1
    
    ; 2. Thư viện Thẻ từ RFID RC522
    miguelbalboa/MFRC522 @ ^1.4.10
    
    ; 3. Thư viện Cảm biến vân tay (Dùng bản của Adafruit rất ổn định)
    adafruit/Adafruit Fingerprint Sensor Library @ ^2.1.2
    
    ; 4. Thư viện mạch Âm thanh
    dfrobot/DFRobotDFPlayerMini @ ^1.0.6
    
    ; 5. Thư viện giao tiếp Bot Telegram và xử lý dữ liệu JSON
    witnessmenow/UniversalTelegramBot @ ^1.3.0
    bblanchon/ArduinoJson @ ^6.21.3

    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.14